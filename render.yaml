services:
  - type: web
    name: render-websocket-relay
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: TARGET_DOMAIN
        sync: false
      - key: RELAY_PATH
        value: /prices
